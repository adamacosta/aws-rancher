defaultNamespace: bookinfo
name: bookinfo
dependsOn:
  - name: cert-manager
    acceptedStates:
      - Ready
      - Modified
  - name: external-dns
  - name: issuer
    acceptedStates:
      - Ready
      - Modified
helm:
  chart: ./chart
targetCustomizations:
  - name: prod
    helm:
      values:
        gateway:
          enabled: true
    clusterSelector:
      env: prod