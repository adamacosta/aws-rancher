defaultNamespace: cert-manager
helm:
  chart: cert-manager
  repo: https://charts.jetstack.io
  version: 1.20.2
  values:
    crds:
      enabled: true
    extraArgs:
      - --dns01-recursive-nameservers-only
      - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53
    global:
      imageRegistry: registry.ranchercarbide.dev
    nameservers:
      - 1.1.1.1
    podDnsConfig: null