#cloud-config
bootcmd:
  - rpmkeys --import https://rpm.rancher.io/public.key
packages:
  - jq
  - rke2-selinux
password: $6$cu0E58rgcSL7WOr0$cyllVTFVwhqkRPi4kUFJaaWa5QNYREs5NrR5r2UXXHwWwAXQnR2.ZV.eekGunpcffpB4XyFCJ2zg4m41JLnS00
users:
  - default
  - name: etcd
    no_create_home: true
    shell: /sbin/nologin
    system: true
runcmd:
  - - systemctl
    - restart
    - systemd-sysctl
write_files:
  - content: |
      vm.panic_on_oom=0
      vm.overcommit_memory=1
      kernel.panic=10
      kernel.panic_on_oops=1
    path: /etc/sysctl.d/60-rke2.conf
  - content: |
      [rancher-rke2-common-stable]
      name=Rancher RKE2 Common (stable)
      baseurl=https://rpm.rancher.io/rke2/stable/common/slemicro/noarch
      enabled=1
      gpgcheck=1
      repo_gpgcheck=1
      gpgkey=https://rpm.rancher.io/public.key
    path: /etc/zypp/repos.d/rancher-rke2.repo